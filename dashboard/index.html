<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student-Management-System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app">
    <!-- Sidebar -->
    <aside class="side">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>SMS</span>
        </div>
        <nav>
            <a href="#" class="active"><i class="fas fa-th"></i></a>
            <a href="#"><i class="fas fa-users"></i></a>
            <a href="#"><i class="fas fa-book"></i></a>
            <a href="#"><i class="fas fa-calendar"></i></a>
            <a href="#"><i class="fas fa-cog"></i></a>
        </nav>
        <div class="side-foot">
            <a href="#" id="backBtn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <!-- Header -->
        <header class="top">
            <div class="left">
                <i class="fas fa-bars toggle"></i>
                <h2>Dashboard</h2>
            </div>
            <div class="right">
                <div class="search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search..." />
                </div>
                <div class="user">
                    <i class="fas fa-bell"></i>
                    <span class="avtar">AD</span>
                </div>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats">
            <div class="card">
                <div class="icon blue"><i class="fas fa-users"></i></div>
                <div>
                    <h3 id="total">0</h3>
                    <p>Total</p>
                </div>
            </div>
            <div class="card">
                <div class="icon green"><i class="fas fa-user-plus"></i></div>
                <div>
                    <h3 id="active">0</h3>
                    <p>Active</p>
                </div>
            </div>
            <div class="card">
                <div class="icon orange"><i class="fas fa-user-slash"></i></div>
                <div>
                    <h3 id="pending">0</h3>
                    <p>Inactive</p>
                </div>
            </div>
            <div class="card">
                <div class="icon purple"><i class="fas fa-chart-line"></i></div>
                <div>
                    <h3 id="avg">0%</h3>
                    <p>Avg Grade</p>
                </div>
            </div>
        </div>

        <!-- Course badges -->
        <div class="course-box">
            <h4><i class="fas fa-book"></i> Courses</h4>
            <div class="badges" id="courseStats"></div>
        </div>

        <!-- ===== ADD STUDENT FORM ===== -->
        <div class="form-section">
            <h3><i class="fas fa-user-plus"></i> Add New Student</h3>
            <form id="studentForm" class="student-form">
                <div class="form-row">
                    <div class="group">
                        <label>Full Name <span>*</span></label>
                        <input type="text" id="name" placeholder="e.g: xyz" required />
                    </div>
                    <div class="group">
                        <label>Email <span>*</span></label>
                        <input type="email" id="email" placeholder="e.g:abc@gmail.com" required />
                    </div>
                </div>
                <div class="form-row">
                    <div class="group">
                        <label>Course <span>*</span></label>
                        <select id="course">
                            <option>B.Tech</option>
                            <option>B.Sc</option>
                            <option>BBA</option>
                            <option>MBA</option>
                            <option>BCA</option>
                            <option>MCA</option>
                        </select>
                    </div>
                    <div class="group">
                        <label>Student Number <span>*</span></label>
                        <input type="text" id="studentNumber" placeholder="e.g. xxxxxxxxxx" required />
                        <small style="color:#7a8aa0; font-size:12px; margin-top:4px;">Exactly 10 digits (numbers only)</small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="group">
                        <label>Grade (%) <span>*</span></label>
                        <input type="number" id="grade" placeholder="Enter grade" min="0" max="100" required />
                    </div>
                    <div class="group">
                        <label>Roll Number <span>*</span></label>
                        <input type="text" id="rollNumber" placeholder="e.g. 101" required />
                        <small style="color:#7a8aa0; font-size:12px; margin-top:4px;">Unique roll number for the student</small>
                    </div>
                </div>
                <div class="form-row">
                    <div class="group">
                        <label>Status</label>
                        <select id="status">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn submit-btn">
                    <i class="fas fa-save"></i> Add Student
                </button>
            </form>
        </div>

        <!-- ===== STUDENT TABLE ===== -->
        <div class="tbl-wrap">
            <div class="tbl-head">
                <h3><i class="fas fa-list"></i> All Students</h3>
                <span id="count">0 students</span>
            </div>
            <div class="tbl-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Number</th>
                            <th>Course</th>
                            <th>Grade</th>
                            <th>Roll No.</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="list"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== LAST ADDED STUDENT ===== -->
        <div class="last-added" id="lastAdded">
            <i class="fas fa-user-check"></i>
            <span>Last added: <strong id="lastName">None yet</strong></span>
        </div>

    </main>
</div>

<script src="../js/storage.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
